<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0; overflow:hidden; font-family: sans-serif;">
    <!-- If you see this text, the page is actually loading -->
    <div style="position:fixed; top:0; left:0; right:0; padding:10px; background:#000; color:#fff; z-index:9999;">
      LOADED — if camera doesn’t open, it’s permissions/browser blocking.
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-marker preset="hiro">
        <a-box position="0 0.5 0"></a-box>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
